<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Da Lat Personal Travel Guide - Multi-Filter Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #38bdf8;
            --bg-dark: #020617;
        }
        body { 
            background: var(--bg-dark); 
            color: #f1f5f9; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
        }
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .card-travel {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-travel:hover {
            border-color: var(--primary);
            transform: translateY(-4px) scale(1.01);
            background: rgba(30, 41, 59, 0.6);
            box-shadow: 0 20px 25px -5px rgba(56, 189, 248, 0.1);
        }
        .cate-chip {
            transition: all 0.2s ease;
            cursor: pointer;
            user-select: none;
        }
        .cate-chip.active {
            ring: 2px;
            ring-offset: 2px;
            ring-color: white;
            transform: scale(1.05);
            filter: brightness(1.2);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-10 custom-scrollbar">

    <div class="max-w-7xl mx-auto">
        <!-- APP HEADER -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-6">
            <div class="space-y-1">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-sky-500 rounded-xl flex items-center justify-center shadow-lg shadow-sky-500/20">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                        </svg>
                    </div>
                    <h1 class="text-3xl md:text-4xl font-extrabold tracking-tighter text-white">DALAT <span class="text-sky-400 font-light">HANDBOOK</span></h1>
                </div>
                <p class="text-slate-500 text-xs font-semibold uppercase tracking-[0.3em] pl-1">Internal Travel Assets • Multi-Choice Filter</p>
            </div>

            <div id="gps-box" class="glass-panel px-5 py-3 rounded-2xl flex items-center gap-4 border border-slate-800">
                <div class="relative flex h-3 w-3">
                    <span id="gps-ping" class="animate-ping absolute inline-flex h-full w-full rounded-full bg-slate-500 opacity-75"></span>
                    <span id="gps-dot" class="relative inline-flex rounded-full h-3 w-3 bg-slate-600"></span>
                </div>
                <div>
                    <p id="gps-text" class="text-[10px] text-slate-400 font-bold uppercase tracking-wider italic">GPS Status</p>
                    <p id="gps-coords" class="text-xs text-slate-200 font-mono italic opacity-60">Initializing...</p>
                </div>
            </div>
        </header>

        <!-- SEARCH & MULTI-FILTERS -->
        <section class="glass-panel p-8 rounded-[2.5rem] mb-12 relative overflow-hidden">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 relative z-10">
                
                <!-- Cột trái: Tên & Khu vực -->
                <div class="lg:col-span-4 space-y-6">
                    <div class="space-y-2">
                        <label class="text-[11px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">Tên / Món Ăn</label>
                        <input type="text" id="inputSearch" oninput="debounceFilter()" placeholder="Nhập tên hoặc keyword..." 
                            class="w-full bg-slate-900/80 border border-slate-700/50 rounded-2xl px-5 py-3.5 text-sm focus:border-sky-500 outline-none transition-all placeholder:text-slate-600">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[11px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">Khu Vực</label>
                        <select id="selectKhuVuc" onchange="applyFilters()" 
                            class="w-full bg-slate-900/80 border border-slate-700/50 rounded-2xl px-5 py-3.5 text-sm focus:border-sky-500 outline-none cursor-pointer appearance-none">
                            <option value="">Tất cả khu vực</option>
                            <option value="Trung tâm">Trung tâm</option>
                            <option value="Trại Mát">Trại Mát</option>
                            <option value="Hồ Tuyền Lâm">Hồ Tuyền Lâm</option>
                            <option value="Mimosa/Prenn">Mimosa/Prenn</option>
                            <option value="Tà Nung">Tà Nung</option>
                            <option value="Ngoại Ô Xa">Ngoại Ô Xa</option>
                        </select>
                    </div>
                </div>

                <!-- Cột phải: Category Multi-choice -->
                <div class="lg:col-span-8 space-y-3">
                    <div class="flex justify-between items-center">
                        <label class="text-[11px] font-black text-slate-400 uppercase tracking-widest">Categories (Multi-select)</label>
                        <button onclick="resetFilters()" class="text-[10px] text-sky-500 font-bold hover:underline">Clear all filters</button>
                    </div>
                    <div id="category-container" class="flex flex-wrap gap-3">
                        <!-- Chips sẽ được render ở đây -->
                    </div>
                </div>
            </div>
        </section>

        <!-- RESULTS GRID -->
        <div id="loader" class="flex flex-col items-center justify-center py-32 space-y-4">
            <div class="w-12 h-12 border-4 border-sky-500/10 border-t-sky-500 rounded-full animate-spin"></div>
            <p class="text-slate-600 font-medium tracking-widest uppercase text-[10px]">Syncing Data...</p>
        </div>

        <div id="results-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>

        <footer class="mt-20 border-t border-slate-800 py-10 text-center">
            <p class="text-slate-600 text-[10px] tracking-widest uppercase font-bold">Smart Travel Planner • 2024</p>
        </footer>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTnXggiUJriOBPHz05pt01aIq_qaCDeQAcWpyYTG6zx1XI9WzfVDTbb8rPwYPf2w8uHxeDpx3Tznx53/pub?gid=615358788&single=true&output=csv';
        
        // Cấu hình Category dựa trên hình fen gửi
        const CATEGORIES = [
            { id: 'Ăn', label: 'Ăn', color: '#ffb38a', text: '#5c2d14' },
            { id: 'Chơi', label: 'Chơi', color: '#c5e8b7', text: '#2d4d1e' },
            { id: 'Chụp hình', label: 'Chụp hình', color: '#b3e0ff', text: '#1e3d5c' },
            { id: 'Uống', label: 'Uống', color: '#ffeb99', text: '#5c4b14' },
            { id: 'Local', label: 'Local', color: '#ff7070', text: '#5c1414' },
            { id: 'Ăn Nhẹ', label: 'Ăn Nhẹ', color: '#f7d1ff', text: '#4d1e5c' },
            { id: 'View Checkin', label: 'View Checkin', color: '#bcd6d6', text: '#2d4040' },
            { id: 'Đặc sản', label: 'Đặc sản', color: '#eaff8a', text: '#404d1e' }
        ];

        let fullData = [];
        let userPos = null;
        let selectedCates = new Set();
        let filterTimeout;

        // Render Category Chips
        function renderCategoryChips() {
            const container = document.getElementById('category-container');
            container.innerHTML = CATEGORIES.map(cate => `
                <div onclick="toggleCategory('${cate.id}')" 
                     id="chip-${cate.id}"
                     class="cate-chip px-5 py-2.5 rounded-2xl text-xs font-bold transition-all border border-transparent flex items-center gap-2"
                     style="background-color: ${cate.color}20; color: ${cate.color}; border-color: ${cate.color}30">
                    <span class="w-2 h-2 rounded-full" style="background-color: ${cate.color}"></span>
                    ${cate.label}
                    <svg id="icon-${cate.id}" class="w-3 h-3 hidden" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"></path></svg>
                </div>
            `).join('');
        }

        function toggleCategory(id) {
            const chip = document.getElementById(`chip-${id}`);
            const icon = document.getElementById(`icon-${id}`);
            const cateObj = CATEGORIES.find(c => c.id === id);

            if (selectedCates.has(id)) {
                selectedCates.delete(id);
                chip.classList.remove('active');
                chip.style.backgroundColor = `${cateObj.color}20`;
                chip.style.color = cateObj.color;
                icon.classList.add('hidden');
            } else {
                selectedCates.add(id);
                chip.classList.add('active');
                chip.style.backgroundColor = cateObj.color;
                chip.style.color = cateObj.text;
                icon.classList.remove('hidden');
            }
            applyFilters();
        }

        // GPS Logic
        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition(pos => {
                userPos = { lat: pos.coords.latitude, lon: pos.coords.longitude };
                const gpsTxt = document.getElementById('gps-text');
                const gpsCoords = document.getElementById('gps-coords');
                const dot = document.getElementById('gps-dot');
                const ping = document.getElementById('gps-ping');
                
                gpsTxt.innerText = "GPS Online";
                gpsTxt.classList.add('text-emerald-400');
                gpsCoords.innerText = `${userPos.lat.toFixed(4)}, ${userPos.lon.toFixed(4)}`;
                dot.className = "relative inline-flex rounded-full h-3 w-3 bg-emerald-500";
                ping.className = "animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75";
                
                applyFilters();
            }, null, { enableHighAccuracy: true });
        }

        function calcDist(lat1, lon1, lat2, lon2) {
            if (!lat1 || !lon1 || !lat2 || !lon2) return 9999;
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // Fetch Data
        Papa.parse(CSV_URL, {
            download: true,
            header: true,
            complete: (res) => {
                fullData = res.data.filter(d => d.Tên);
                document.getElementById('loader').classList.add('hidden');
                renderCategoryChips();
                applyFilters();
            }
        });

        function debounceFilter() {
            clearTimeout(filterTimeout);
            filterTimeout = setTimeout(applyFilters, 300);
        }

        function resetFilters() {
            document.getElementById('inputSearch').value = '';
            document.getElementById('selectKhuVuc').value = '';
            selectedCates.clear();
            renderCategoryChips();
            applyFilters();
        }

        function applyFilters() {
            const query = document.getElementById('inputSearch').value.toLowerCase();
            const khuVuc = document.getElementById('selectKhuVuc').value;

            let filtered = fullData.filter(item => {
                const matchSearch = item.Tên.toLowerCase().includes(query) || (item.Recommend && item.Recommend.toLowerCase().includes(query));
                const matchKV = !khuVuc || item['Khu vực'] === khuVuc;
                
                // Logic Multi-choice: Phải chứa TẤT CẢ categories đã chọn
                let matchCate = true;
                if (selectedCates.size > 0) {
                    const itemCates = item.Category ? item.Category.split(',').map(c => c.trim()) : [];
                    matchCate = Array.from(selectedCates).every(selected => itemCates.includes(selected));
                }
                
                return matchSearch && matchKV && matchCate;
            });

            if (userPos) {
                filtered.sort((a, b) => getDist(a) - getDist(b));
            }

            renderGrid(filtered);
        }

        function getDist(item) {
            if (!userPos || !item['Vị trí']) return 9999;
            const c = item['Vị trí'].split(',');
            return calcDist(userPos.lat, userPos.lon, parseFloat(c[0]), parseFloat(c[1]));
        }

        function renderGrid(items) {
            const grid = document.getElementById('results-grid');
            grid.innerHTML = '';

            items.forEach(item => {
                const d = getDist(item);
                const distStr = d > 1000 ? '-- km' : d.toFixed(1) + ' km';
                const diffColor = item['Di chuyển'] === 'Dễ' ? 'bg-emerald-500/10 text-emerald-400' : 
                                 item['Di chuyển'] === 'Trung bình' ? 'bg-amber-500/10 text-amber-400' : 'bg-rose-500/10 text-rose-400';

                grid.innerHTML += `
                    <div class="card-travel rounded-[2.5rem] p-8 flex flex-col justify-between group">
                        <div>
                            <div class="flex justify-between items-start mb-6">
                                <span class="${diffColor} text-[9px] font-black px-3 py-1 rounded-full uppercase tracking-widest border border-current opacity-70">
                                    ${item['Di chuyển'] || 'Unknown'}
                                </span>
                                <div class="text-sky-400 font-bold text-sm flex items-center gap-1">
                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path></svg>
                                    ${distStr}
                                </div>
                            </div>

                            <h3 class="text-xl font-bold text-white mb-3 leading-tight group-hover:text-sky-400 transition-colors">${item.Tên}</h3>
                            
                            <div class="flex flex-wrap gap-2 mb-6">
                                <span class="bg-slate-800 text-slate-400 text-[9px] px-2.5 py-1 rounded-lg font-black uppercase">${item['Khu vực']}</span>
                                ${item.Category.split(',').map(c => {
                                    const cData = CATEGORIES.find(cat => cat.id === c.trim());
                                    return `<span class="text-[9px] px-2.5 py-1 rounded-lg font-black uppercase" style="background-color: ${cData ? cData.color : '#334155'}20; color: ${cData ? cData.color : '#cbd5e1'}">${c.trim()}</span>`;
                                }).join('')}
                            </div>

                            <div class="space-y-4 text-xs">
                                <div class="bg-white/5 rounded-2xl p-4 border border-white/5 italic text-slate-300 leading-relaxed relative overflow-hidden">
                                    <div class="absolute top-0 left-0 w-1 h-full bg-sky-500/30"></div>
                                    <span class="text-sky-500 font-bold not-italic mr-1 uppercase text-[9px] tracking-widest">Recommend:</span> ${item.Recommend || 'N/A'}
                                </div>

                                <div class="flex justify-between items-center px-1">
                                    <div class="space-y-1">
                                        <p class="text-slate-500 uppercase font-black text-[9px]">Giờ mở cửa</p>
                                        <p class="text-slate-200 font-bold">${item['Giờ mở cửa'] || '--:--'}</p>
                                    </div>
                                    <div class="space-y-1 text-right">
                                        <p class="text-slate-500 uppercase font-black text-[9px]">Giá/món</p>
                                        <p class="text-slate-200 font-bold">${item['Giá/món'] || 'N/A'}</p>
                                    </div>
                                </div>

                                ${item['Lưu ý đường vào'] ? `
                                <div class="p-3 bg-rose-500/5 rounded-xl border border-rose-500/10 flex gap-2 items-center">
                                    <span class="text-rose-500 text-[10px]">⚠️</span>
                                    <p class="text-rose-400 text-[10px] leading-tight font-medium">${item['Lưu ý đường vào']}</p>
                                </div>` : ''}
                            </div>
                        </div>

                        <a href="${item.Link}" target="_blank" class="mt-8 w-full bg-gradient-to-br from-slate-800 to-slate-900 hover:from-sky-600 hover:to-sky-700 text-white py-4 rounded-2xl text-[10px] font-black uppercase tracking-[0.2em] transition-all border border-slate-700 hover:border-sky-500 text-center flex items-center justify-center gap-2">
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                            Chỉ đường Maps
                        </a>
                    </div>
                `;
            });

            if (items.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-20 text-center text-slate-600 uppercase text-[10px] font-black tracking-widest animate-pulse-soft">Không tìm thấy địa điểm phù hợp</div>`;
            }
        }
    </script>
</body>
</html>
