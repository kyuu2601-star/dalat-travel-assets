<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dalat Travel OS - Premium Analytics</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: #f1f5f9; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .glass-panel { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        
        /* --- LOADING SCREEN ANIMATIONS --- */
        #loading-screen { 
            position: fixed; inset: 0; z-index: 10000; 
            background: url('bg.png') no-repeat center center;
            background-size: cover;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            padding: 60px 0 40px 0; /* Padding Bottom 40px để neo chữ Loading sát cạnh dưới */
        }

        @keyframes slide-scenery { from { background-position: 0 0; } to { background-position: -3000px 0; } }
        .scenery-layer {
            position: absolute; bottom: 120px; width: 100%; height: 150px; /* Tăng lên 150px và neo sát mép lề tại 120px */
            background: url('scenery.png') repeat-x;
            background-size: auto 100%;
            animation: slide-scenery 15s linear infinite;
            z-index: 2; opacity: 0.9;
        }

        @keyframes slide-road { from { background-position: 0 0; } to { background-position: -1000px 0; } }
        .road-layer {
            position: absolute; bottom: 0; width: 100%; height: 160px;
            background: url('road.png') repeat-x;
            background-size: auto 100%;
            animation: slide-road 1.5s linear infinite;
            z-index: 3;
        }

        @keyframes bike-ride { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-3px) rotate(1deg); } }
        .bike-layer {
            position: absolute; bottom: 70px; left: 15%; width: 110px;
            z-index: 4; animation: bike-ride 0.4s ease-in-out infinite;
        }

        @keyframes piano { 0%, 100% { transform: translateY(0); opacity: 0.5; } 50% { transform: translateY(-10px); opacity: 1; } }
        .char { display: inline-block; animation: piano 1.2s infinite; font-style: italic; }
        .c1{animation-delay:0.1s} .c2{animation-delay:0.2s} .c3{animation-delay:0.3s}
        .c4{animation-delay:0.4s} .c5{animation-delay:0.5s} .c6{animation-delay:0.6s}
        .c7{animation-delay:0.7s} .c8{animation-delay:0.8s} .c9{animation-delay:0.9s}

        /* --- IN-APP STYLES --- */
        .stat-box { background: rgba(20, 20, 20, 0.8); border: 1px solid rgba(245, 158, 11, 0.3); box-shadow: inset 0 0 10px rgba(245, 158, 11, 0.1); transition: all 0.3s ease; }
        .stat-box:hover { border-color: rgba(245, 158, 11, 0.6); box-shadow: 0 0 15px rgba(245, 158, 11, 0.2); }
        .card-travel { background: rgba(30, 41, 59, 0.3); border: 1px solid rgba(255, 255, 255, 0.03); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); position: relative; cursor: pointer; }
        .card-travel.active { border-color: #10b981; transform: translateY(-5px); background: rgba(30, 41, 59, 0.5); }
        .cate-chip { transition: all 0.2s ease; cursor: pointer; user-select: none; }
        .cate-chip.active { filter: brightness(1.2); box-shadow: 0 0 20px rgba(255, 255, 255, 0.1); transform: scale(1.05); }
        @keyframes pulse-status { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .animate-status { animation: pulse-status 2s infinite; }
        .recommend-scroll::-webkit-scrollbar { width: 4px; }
        .recommend-scroll::-webkit-scrollbar-thumb { background: rgba(245, 158, 11, 0.2); border-radius: 10px; }
        .recommend-text { white-space: pre-line; }
        .recommend-text b, .recommend-text strong { color: #ffffff !important; font-weight: 800 !important; }
        .image-overlay { position: absolute; top: 175px; left: 15px; right: 15px; bottom: 95px; background: #080c14; border-radius: 1.25rem; z-index: 50; display: none; border: 1.5px solid rgba(245, 158, 11, 0.4); overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .image-overlay img { width: 100%; height: 100%; object-fit: contain; padding: 8px; }
        #warning-radar { position: fixed; top: 25px; right: 20px; z-index: 9999; cursor: pointer; }
        .radar-box { width: 22px; height: 22px; background: #ef4444; border-radius: 6px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4); border: 1px solid rgba(255,255,255,0.2); }
        .radar-box span { color: white; font-weight: 900; font-size: 14px; line-height: 1; }
        @keyframes radar-blink { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(1.15); filter: brightness(1.5); box-shadow: 0 0 20px #ef4444; } }
        .radar-blink { animation: radar-blink 0.5s infinite; }
        #warning-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(2, 6, 23, 0.98); z-index: 10000; display: none; padding: 20px; overflow-y: auto; backdrop-filter: blur(15px); }
        .warning-long-card { background: rgba(254, 226, 226, 0.05); border: 1px solid rgba(239, 68, 68, 0.2); border-radius: 1.25rem; overflow: hidden; display: flex; flex-direction: column; }
        .warning-long-card.near-danger { border: 2px solid #ef4444; background: rgba(239, 68, 68, 0.15); box-shadow: 0 0 20px rgba(239, 68, 68, 0.2); }
        .warning-image-box { width: 100%; height: 200px; background: #000; border-bottom: 1px solid rgba(239, 68, 68, 0.1); }
        .warning-image-box img { width: 100%; height: 100%; object-fit: contain; }
        .toggle-switch { position: relative; width: 44px; height: 22px; cursor: pointer; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-color: #ef4444; transition: .4s; border-radius: 20px; border: 1.5px solid rgba(255,255,255,0.2); }
        .toggle-slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 2.5px; background-color: white; transition: .4s; border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        input:checked + .toggle-slider { background-color: #10b981; }
        input:checked + .toggle-slider:before { transform: translateX(21px); }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="loading-screen">
        <div class="w-full text-center z-10">
            <img src="logo.png" class="w-48 mx-auto mb-2 drop-shadow-2xl" alt="Logo">
            <p id="loading-status" class="text-[#020617] font-bold text-[9px] uppercase tracking-[0.3em] bg-white/40 px-5 py-1.5 rounded-full inline-block backdrop-blur-sm border border-white/20">
                Searching for GPS Satellites...
            </p>
        </div>

        <div class="scenery-layer"></div>
        <div class="road-layer"></div>
        <img src="bike.png" class="bike-layer" alt="Bike">

        <div class="w-full text-center z-10">
            <div class="text-white font-black text-4xl tracking-widest uppercase italic drop-shadow-lg">
                <span class="char c1">L</span><span class="char c2">o</span><span class="char c3">a</span><span class="char c4">d</span><span class="char c5">i</span><span class="char c6">n</span><span class="char c7">g</span><span class="char c8">.</span><span class="char c9">.</span>
            </div>
        </div>
    </div>

    <div id="warning-radar" onclick="toggleWarningModal()">
        <div id="radar-box" class="radar-box"><span>!</span></div>
    </div>

    <div id="warning-modal">
        <div class="max-w-2xl mx-auto pt-10 pb-20">
            <div class="flex justify-between items-center mb-8 border-b border-white/10 pb-5">
                <h2 class="text-2xl font-black italic text-white uppercase tracking-tighter">Traffic <span class="text-rose-500">Warning</span></h2>
                <div class="flex items-center gap-2 bg-white/5 pl-3 pr-1 py-1 rounded-full border border-white/10">
                    <span class="text-[9px] font-black uppercase text-slate-400 tracking-widest mr-1">Notify</span>
                    <label class="toggle-switch scale-75 origin-right">
                        <input type="checkbox" id="vibrateToggle" checked onchange="saveVibrateState()">
                        <span class="toggle-slider"></span>
                    </label>
                    <button onclick="toggleWarningModal()" class="text-white bg-rose-500 px-3 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest shadow-lg shadow-rose-900/40">Close</button>
                </div>
            </div>
            <div id="warning-list" class="space-y-6"></div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-6">
            <div class="space-y-1">
                <h1 class="text-3xl font-extrabold text-white tracking-tighter italic uppercase">DALAT <span class="text-amber-500 font-light italic">OS</span></h1>
                <p class="text-slate-500 text-[10px] uppercase tracking-[0.4em] font-black italic">Advanced Status Logic</p>
            </div>
            <div id="gps-box" class="glass-panel px-6 py-3 rounded-2xl border border-slate-800 flex items-center gap-4">
                <div class="relative flex h-3 w-3">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                </div>
                <span id="gps-coords" class="text-[11px] font-mono text-emerald-400 font-bold uppercase tracking-widest">Searching...</span>
            </div>
        </header>

        <section class="glass-panel p-8 rounded-[2.5rem] mb-12 border border-amber-500/10 shadow-2xl">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <div class="lg:col-span-4 space-y-5">
                    <input type="text" id="inputSearch" oninput="applyFilters()" placeholder="Tên quán, món ăn..." class="w-full bg-slate-900 border border-slate-700 rounded-2xl px-5 py-3.5 text-sm focus:border-amber-500 outline-none transition-all placeholder:text-slate-600">
                    <select id="selectKhuVuc" onchange="applyFilters()" class="w-full bg-slate-900 border border-slate-700 rounded-2xl px-5 py-3.5 text-sm outline-none cursor-pointer appearance-none text-slate-300">
                        <option value="">Tất cả khu vực</option>
                        <option value="Trung tâm">Trung tâm</option>
                        <option value="Trại Mát">Trại Mát</option>
                        <option value="Hồ Tuyền Lâm">Hồ Tuyền Lâm</option>
                        <option value="Mimosa/Prenn">Mimosa/Prenn</option>
                        <option value="Tà Nung">Tà Nung</option>
                        <option value="Ngoại Ô Xa">Ngoại Ô Xa</option>
                    </select>
                </div>
                <div class="lg:col-span-8">
                    <div id="category-container" class="flex flex-wrap gap-3"></div>
                </div>
            </div>
        </section>
        <div id="results-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 italic text-slate-200"></div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTnXggiUJriOBPHz05pt01aIq_qaCDeQAcWpyYTG6zx1XI9WzfVDTbb8rPwYPf2w8uHxeDpx3Tznx53/pub?gid=615358788&single=true&output=csv';
        const CATEGORIES = [{id:'Ăn',color:'#ffb38a',text:'#5c2d14'},{id:'Chơi',color:'#c5e8b7',text:'#2d4d1e'},{id:'Chụp hình',color:'#b3e0ff',text:'#1e3d5c'},{id:'Uống',color:'#ffeb99',text:'#5c4b14'},{id:'Local',color:'#ff7070',text:'#5c1414'},{id:'Ăn Nhẹ',color:'#f7d1ff',text:'#4d1e5c'},{id:'View Checkin',color:'#bcd6d6',text:'#2d4040'},{id:'Đặc sản',color:'#eaff8a',text:'#404d1e'}];

        let fullData = []; let userPos = null; let selectedCates = new Set(); let lastPos = null; let isSystemLive = false;

        const audio500 = new Audio('500m.mp3'); const audio100 = new Audio('100m.mp3'); const audio10 = new Audio('10m.mp3');
        let lastAlertDistance = 999;

        function unlockAudio() {
            [audio500, audio100, audio10].forEach(a => { a.play().then(() => { a.pause(); a.currentTime = 0; }).catch(()=>{}); });
            document.removeEventListener('click', unlockAudio);
        }
        document.addEventListener('click', unlockAudio);

        function playSmartWarning(dist) {
            if (!document.getElementById('vibrateToggle').checked) return;
            const d = parseFloat(dist);
            if (d <= 0.5 && d > 0.1 && lastAlertDistance > 0.5) { audio500.play().catch(()=>{}); lastAlertDistance = 0.5; } 
            else if (d <= 0.1 && d > 0.01 && lastAlertDistance > 0.1) { audio100.play().catch(()=>{}); lastAlertDistance = 0.1; } 
            else if (d <= 0.01 && lastAlertDistance > 0.01) { audio10.play().catch(()=>{}); lastAlertDistance = 0.01; }
            if (d > 1.0) lastAlertDistance = 999;
        }

        navigator.geolocation.watchPosition(pos => {
            const newPos = { lat: pos.coords.latitude, lon: pos.coords.longitude };
            if (!isSystemLive) {
                const ls = document.getElementById('loading-screen');
                if (ls) { ls.style.opacity = '0'; setTimeout(() => ls.remove(), 1000); }
                isSystemLive = true;
            }
            if (!lastPos || Math.abs(newPos.lat - lastPos.lat) > 0.0001 || Math.abs(newPos.lon - lastPos.lon) > 0.0001) {
                lastPos = newPos; userPos = newPos;
                document.getElementById('gps-coords').innerText = `${userPos.lat.toFixed(4)}, ${userPos.lon.toFixed(4)}`;
                checkRadarStatus(); applyFilters();
            }
        }, err => {
            document.getElementById('loading-status').innerText = "GPS Error: Please enable location";
            document.getElementById('loading-status').style.backgroundColor = "rgba(239, 68, 68, 0.5)";
        }, { enableHighAccuracy: true });

        function checkRadarStatus() {
            if (!userPos || fullData.length === 0) return;
            let minDistance = 9999; let nearestWarning = null;
            fullData.forEach(item => { if (item._AC) { const d = getEstimatedDist(item._AC); if (d < minDistance) { minDistance = d; nearestWarning = item._AB; } } });
            if (nearestWarning && minDistance <= 1.0) {
                document.getElementById('radar-box').classList.add('radar-blink');
                triggerHeavyWarning("⚠️ CẢNH BÁO", nearestWarning + " (" + minDistance + "km)");
                playSmartWarning(minDistance);
            } else { document.getElementById('radar-box').classList.remove('radar-blink'); }
        }

        function triggerHeavyWarning(title, message) {
            if (!document.getElementById('vibrateToggle').checked) return;
            if (Notification.permission === 'granted' && 'serviceWorker' in navigator) {
                navigator.serviceWorker.ready.then(reg => { reg.active.postMessage({ type: 'SHOW_NOTIFICATION', payload: { title, body: message, silent: false } }); });
            }
        }

        Papa.parse(CSV_URL, {
            download: true, header: false, complete: (res) => {
                const rows = res.data; const headerRow = rows[0];
                fullData = rows.slice(1).map(row => {
                    let obj = {}; headerRow.forEach((h, i) => { if(h) obj[h] = row[i]; });
                    obj._AA = row[26]; obj._AB = row[27]; obj._AC = row[28]; return obj;
                }).filter(d => d.Tên || d._AB);
                renderChips(); applyFilters();
            }
        });

        function getEstimatedDist(target) {
            if (!userPos || !target) return 9999;
            const c = target.split(',').map(Number); const R = 6371;
            const dLat = (c[0] - userPos.lat) * Math.PI / 180; const dLon = (c[1] - userPos.lon) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(userPos.lat * Math.PI / 180) * Math.cos(c[0] * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return (R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)) * 1.4).toFixed(1);
        }

        function renderChips() {
            const container = document.getElementById('category-container');
            container.innerHTML = CATEGORIES.map(c => `<div onclick="toggleCate('${c.id}')" id="chip-${c.id}" class="cate-chip px-5 py-2 rounded-2xl text-[10px] font-black uppercase border border-slate-800" style="background-color: ${c.color}15; color: ${c.color}">${c.id}</div>`).join('');
        }

        function toggleCate(id) {
            const chip = document.getElementById(`chip-${id}`); const cate = CATEGORIES.find(c => c.id === id);
            if (selectedCates.has(id)) { selectedCates.delete(id); chip.classList.remove('active'); chip.style.backgroundColor = cate.color+'15'; chip.style.color = cate.color; }
            else { selectedCates.add(id); chip.classList.add('active'); chip.style.backgroundColor = cate.color; chip.style.color = cate.text; }
            applyFilters();
        }

        function applyFilters() {
            const query = document.getElementById('inputSearch').value.toLowerCase();
            const kv = document.getElementById('selectKhuVuc').value;
            let filtered = fullData.filter(item => {
                if (!item.Tên) return false;
                const txt = (item.Tên + ' ' + (item.Recommend || '')).toLowerCase();
                const matchKV = !kv || item['Khu vực'] === kv;
                const matchCate = selectedCates.size === 0 || Array.from(selectedCates).every(s => (item.Category || '').includes(s));
                return txt.includes(query) && matchKV && matchCate;
            });
            if (userPos) filtered.sort((a, b) => getEstimatedDist(a['Vị trí']) - getEstimatedDist(b['Vị trí']));
            renderGrid(filtered);
        }

        function renderGrid(items) {
            const grid = document.getElementById('results-grid');
            grid.innerHTML = items.map((item, index) => {
                const dist = getEstimatedDist(item['Vị trí']);
                let recommendHtml = (item.Recommend || '').replace(/&lt;b&gt;/g, '<b>').replace(/&lt;\/b&gt;/g, '</b>').replace(/<b>/g, '<b>').replace(/<\/b>/g, '</b>');
                return `<div class="card-travel rounded-[2.5rem] p-8 flex flex-col justify-between h-full group" onclick="selectCard(this)">
                    <div id="overlay-${index}" class="image-overlay"><img id="img-${index}" src="" alt="Preview"></div>
                    <div>
                        <div class="flex justify-between items-center mb-6">
                            <span class="text-emerald-400 text-[10px] font-black uppercase tracking-widest">📍 ${dist} KM</span>
                        </div>
                        <h3 class="text-2xl font-extrabold text-white uppercase mb-4">${item.Tên}</h3>
                        <div class="bg-white/5 p-4 rounded-2xl text-xs italic text-slate-300 leading-relaxed recommend-text line-clamp-4">${recommendHtml}</div>
                    </div>
                    <a href="${item.Link}" target="_blank" class="mt-8 block w-full text-center bg-amber-600 hover:bg-amber-500 text-white py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all">Chỉ Đường</a>
                </div>`;
            }).join('');
        }

        window.selectCard = function(element) { document.querySelectorAll('.card-travel').forEach(c => c.classList.remove('active')); element.classList.add('active'); };
        function toggleWarningModal() { const m = document.getElementById('warning-modal'); m.style.display = (m.style.display === 'block') ? 'none' : 'block'; if(m.style.display === 'block') renderWarningList(); }
        window.onload = () => { const s = localStorage.getItem('vibrateEnabled'); if (s !== null) document.getElementById('vibrateToggle').checked = s === 'true'; };
        function saveVibrateState() { localStorage.setItem('vibrateEnabled', document.getElementById('vibrateToggle').checked); }
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
    </script>
</body>
</html>
